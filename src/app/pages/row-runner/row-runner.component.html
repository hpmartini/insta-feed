<app-spinner [showSpinner]="!article || isAutostart"></app-spinner>

<div
  [ngClass]="{
    'content--regular': true,
    'content--mobile': true
  }"
  class="page-content"
>
  <div *ngIf="article && !isAutostart" class="header">
    <div *ngIf="!fullScreen">
      <h1>{{ article?.title }}</h1>
      <h2>{{ article?.excerpt }}</h2>
    </div>

    <div class="buttonRow" fxLayout="row">
      <button
        (click)="toggleLanguage()"
        class="toggleSrt"
        color="accent"
        mat-fab
      >
        <span>{{ activeLanguageDisplay }}</span>
      </button>
      <button
        (click)="toggleRsvpMode()"
        *ngIf="!isRowRunnerActive"
        class="toggleSrt"
        color="accent"
        mat-fab
        [title]="isSemanticRsvp ? 'Switch to Row Runner' : 'Switch to Semantic RSVP'"
      >
        <mat-icon>{{ isSemanticRsvp ? 'linear_scale' : 'view_stream' }}</mat-icon>
      </button>
      <button
        (click)="toggleActive()"
        class="toggleSrt"
        color="primary"
        mat-fab
      >
        <mat-icon *ngIf="!isRowRunnerActive">double_arrow</mat-icon>
        <mat-icon *ngIf="isRowRunnerActive">cancel</mat-icon>
      </button>
      <button
        (click)="toggleActiveFullscreen()"
        *ngIf="!isRowRunnerActive"
        class="toggleSrt"
        color="primary"
        mat-fab
      >
        <mat-icon>fullscreen</mat-icon>
      </button>
    </div>
  </div>

  <article
    *ngIf="!isRowRunnerActive && !isAutostart"
    class="article-content"
    lang="de"
    [ngClass]="{ 'article-content--regular': true }"
  >
    <p>
      {{ this.article?.content }}
    </p>
  </article>

  <div
    [ngClass]="{ 'animationContainer--regular': true }"
    class="animationContainer"
  >
    <app-animation
      *ngIf="isRowRunnerActive"
      [inputText]="article.content"
      [speed]="speed"
      [language]="activeLanguage"
      [isSemanticRsvp]="isSemanticRsvp"
      (finished)="onAnimationFinished()"
    ></app-animation>

    <div *ngIf="showQuiz" class="quiz-container">
      <h3>Micro-Quiz</h3>
      <div *ngIf="quizLoading">
        <app-spinner [showSpinner]="true"></app-spinner>
        <p>Generating questions...</p>
      </div>
      <div *ngIf="!quizLoading && quizData?.questions">
        <div class="question-card" *ngFor="let q of quizData.questions; let qIndex = index">
          <p><strong>{{ q.question }}</strong></p>
          <div class="options">
            <button 
              *ngFor="let opt of q.options; let optIndex = index"
              (click)="selectAnswer(qIndex, optIndex)"
              [ngClass]="{
                'selected': quizAnswers[qIndex] === optIndex,
                'correct': quizAnswers[qIndex] !== undefined && optIndex === q.correctIndex,
                'wrong': quizAnswers[qIndex] === optIndex && optIndex !== q.correctIndex
              }"
              [disabled]="quizAnswers[qIndex] !== undefined"
            >
              {{ opt }}
            </button>
          </div>
          <p *ngIf="quizAnswers[qIndex] !== undefined" class="result-text">
            {{ quizResults[qIndex] ? 'Correct!' : 'Incorrect.' }}
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
